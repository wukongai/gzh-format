name: gzh-format
kind: renderer-skill
owner: content-factory
status: active

purpose: >-
  Convert Obsidian/Markdown long-form articles into WeChat Official Account
  compatible inline-style HTML, validate the result, and package a local
  copy preview. Publishing and credentialed draft creation stay delegated.

triggers:
  use_when:
    - "用户要求公众号排版、微信排版、gzh-format 或把 Markdown/OB 长文转公众号 HTML。"
    - "用户要求查看、维护或生成公众号排版主题。"
  do_not_use_when:
    - "用户要求 Pudding/H5 或其它平台排版。"
    - "用户要求创建公众号草稿、发布、群发或 freepublish。"
    - "用户要求写稿、改写事实或生成正文内容。"

inputs:
  - name: markdown_file
    type: path
    required: false
    description: "Markdown 或 Obsidian 长文路径。"
  - name: markdown_text
    type: text
    required: false
    description: "没有文件路径时可直接提供正文。"
  - name: theme_id
    type: enum
    required: false
    default: minimal
    values: [minimal, red, green]
    description: "默认简约。当前确定性 renderer 仅支持 minimal;red/green 为组件库模式。"
  - name: output_html
    type: path
    required: false
    description: "生成的公众号 HTML 片段路径。"

outputs:
  - name: wechat_html
    type: file
    required: true
    description: "从顶层 <section> 开始的公众号正文 HTML 片段,不包含 html/head/body。"
  - name: preview_html
    type: file
    required: false
    description: "带复制按钮的本地预览页;按钮和脚本不进入正文产物。"
  - name: validation_report
    type: text
    required: true
    description: "validate_gzh_html.py 输出的公众号兼容性报告。"

stops:
  - name: missing_input
    condition: "没有 markdown_file 或 markdown_text,且无法从上下文推断。"
  - name: unsupported_platform
    condition: "用户要求 Pudding/H5 或其它非微信公众号 target。"
  - name: unsupported_deterministic_theme
    condition: "用户要求 red/green 命令行自动渲染,但尚未实现对应 renderer adapter。"
  - name: invalid_html
    condition: "validate_gzh_html.py 报 ERROR。"
  - name: non_markdown_input_needs_normalization
    condition: "输入为 docx/pdf/富文本等非 Markdown,需先归一并确认结构。"

delegates:
  - name: wechat-draft-sync
    kind: skill
    when: "用户明确要求把已校验 HTML 创建到微信公众号草稿箱。"
    note: "凭证 doctor、配置读取、图片上传和微信 API 调用全部由该独立能力承担。"
  - name: scripts/render_markdown.py
    kind: cli
    when: "使用默认 minimal 主题确定性渲染 Markdown。"
  - name: scripts/component_lint.py
    kind: cli
    when: "修改主题组件库后检查源头反模式。"
  - name: scripts/validate_gzh_html.py
    kind: cli
    when: "生成 HTML 后检查公众号兼容性。"
  - name: scripts/wrap_preview.py
    kind: cli
    when: "生成本地复制预览页。"

credentials:
  mode: none
  required: false
  reads_environment: false
  reads_config_files: false
  note: "本地排版、校验和预览不需要 AppID、AppSecret 或 access token。"

network:
  required: false
  allowed_hosts: []

forbidden:
  - read_wechat_appsecret_or_access_token
  - read_environment_or_credential_config
  - read_dotenv_keychain_or_cookie_files
  - create_wechat_draft_directly
  - publish_or_freepublish_wechat_article
  - support_non_wechat_render_targets
  - rewrite_article_facts_or_add_unrequested_summary
  - output_html_head_body_or_script_in_wechat_content
  - mix_components_from_multiple_themes_in_one_article
  - hardcode_user_absolute_paths_in_skill_docs

state:
  files:
    - name: theme_index
      path: references/theme-index.md
      required: true
    - name: minimal_components
      path: themes/minimal/components.md
      required: true
    - name: shared_components
      path: themes/_shared/common-components.md
      required: true
  runtime_outputs:
    - path: "${system_temp}/gzh-format-regression-*"
      description: "回归脚本使用 Python tempfile 选择系统临时目录;不得作为持久状态依赖。"

scripts:
  - path: scripts/render_markdown.py
    deterministic: true
    supports_themes: [minimal]
    required_flags: ["--theme"]
  - path: scripts/component_lint.py
    deterministic: true
  - path: scripts/validate_gzh_html.py
    deterministic: true
  - path: scripts/wrap_preview.py
    deterministic: true
  - path: scripts/regression.py
    deterministic: true
  - path: scripts/release_check.py
    deterministic: true

tests:
  regression_cases:
    - assets/sample-article.md
    - tests/fixtures/stress-markdown.md
    - "legacy --target pudding is rejected"
  commands:
    - "python3 scripts/component_lint.py ."
    - "python3 scripts/regression.py"
    - "python3 scripts/release_check.py"
    - "skillhub doctor-skill skills/gzh-format --profile commercial"

evaluation:
  score_scope: structural_readiness
  claims:
    utility: false
  case_portfolio:
    success:
      fixture: assets/sample-article.md
      command: "python3 scripts/regression.py"
      expected: "普通样例、压力样例、校验和预览全部通过。"
    failure:
      mechanism: "旧调用继续传入已经删除的 --target pudding。"
      recovery: "移除 --target 并改用独立的平台工具。"
      evidence: scripts/regression.py
    high_risk:
      mechanism: "请求读取公众号凭证、创建草稿、发布或群发。"
      recovery: "停止并委托独立 wechat-draft-sync;本 Skill 不读取凭证。"
      evidence: SKILL.md
  type_checks:
    - deterministic_rendering
    - wechat_html_validation
    - preview_shell_isolation
    - unsupported_target_rejection
  evidence:
    baseline:
      description: "旧的仓库根 Skill 结构只安装 SKILL.md,无法运行回归。"
      artifact: tests/evaluation/2026-07-11-install-and-render-results.md
    holdout:
      fixture: tests/evaluation/held-out-mixed.md
      expected: "0 ERROR,且 YAML private_note 不进入 HTML。"
    negative_transfer:
      command: "python3 scripts/regression.py"
      gate: "--target pudding 必须被拒绝。"
    behavioral_results:
      artifact: tests/evaluation/2026-07-11-install-and-render-results.md
    independent_review: false

review:
  lint:
    command: "skillhub lint-skill skills/gzh-format"
  doctor:
    command: "skillhub doctor-skill skills/gzh-format --profile commercial"
  notes:
    - "排版链路必须在未配置任何 WECHAT_* 环境变量时完整通过。"
    - "AppID/AppSecret 配置只属于独立 wechat-draft-sync,不得复制进本仓库。"
    - "新增 red/green renderer adapter 前,不要承诺命令行自动渲染这些主题。"
